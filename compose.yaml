services:
  server:
    image: ghcr.io/tajirax/cottendns-server:${COTTENDNS_IMAGE_TAG:-latest}
    container_name: cottendns-server
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    environment:
      COTTENDNS_DOMAIN: ${COTTENDNS_DOMAIN:-}
      COTTENDNS_METRICS_ADDRESS: 127.0.0.1:9090
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
